<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Play Javi's Games</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0e0e14;
      --fg: #f5f2ef;
      --muted: #8c8899;
      --accent: #ffd700;
      --card-bg: #1a1a24;
      --card-border: #2e2e40;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(1.5rem, 4vw, 3rem);
    }
    h1 {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 0.3rem 0;
      text-align: center;
    }
    .tagline {
      color: var(--muted);
      font-size: clamp(1rem, 1.8vw, 1.3rem);
      margin: 0 0 clamp(2rem, 5vh, 3.5rem) 0;
      text-align: center;
    }
    .games {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(1.5rem, 3vw, 2.5rem);
      justify-content: center;
      align-items: stretch;
      width: 100%;
      max-width: 1100px;
    }
    .game {
      flex: 1 1 320px;
      max-width: 500px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: clamp(1.5rem, 3vw, 2.2rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .game h2 {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      margin: 0 0 0.25rem 0;
      font-weight: 700;
    }
    .game .sub {
      color: var(--muted);
      font-size: clamp(0.95rem, 1.4vw, 1.1rem);
      margin: 0 0 1.25rem 0;
    }
    .game-row {
      display: flex;
      align-items: center;
      gap: clamp(0.9rem, 2vw, 1.6rem);
      width: 100%;
      margin-bottom: 1.1rem;
    }
    .art {
      flex: 1 1 0;
      max-width: 260px;
      aspect-ratio: 5 / 7;
      border-radius: 14px;
      background: #0a0a10;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 22px rgba(0,0,0,0.35);
    }
    .art img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .art svg { width: 62%; height: 62%; }
    .qr {
      flex: 0 0 auto;
      background: #ffffff;
      padding: 8px;
      border-radius: 10px;
      line-height: 0;
    }
    .qr img, .qr canvas { display: block; }
    .hint {
      margin-top: 1.1rem;
      color: var(--muted);
      font-size: clamp(0.9rem, 1.2vw, 1rem);
    }
    footer {
      margin-top: auto;
      padding-top: 2rem;
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="games">
    <div class="game">
      <h2>Lapping It Up</h2>
      <div class="game-row">
        <div class="art">
          <!-- Title-screen art pulled from the Lapping It Up main deck's
               "Title Screen" card on castle.xyz. -->
          <img src="https://image.castle.xyz/7550acb9c336d7839ce9aa602e093ca1?h=800&format=png"
               alt="Lapping It Up title screen">
        </div>
        <div id="qr-lap" class="qr"></div>
      </div>
      <p class="hint">Beat the daily lap.</p>
    </div>
    <div class="game">
      <h2>Spare Me</h2>
      <div class="game-row">
        <div class="art">
          <!-- Placeholder bowling art: Twemoji 🎳 (CC-BY 4.0). Replace with
               a real Spare Me title graphic when ready. -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" aria-label="Bowling ball and pins">
            <image href="https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/svg/1f3b3.svg" width="36" height="36"/>
          </svg>
        </div>
        <div id="qr-bowl" class="qr"></div>
      </div>
      <p class="hint">Knock them down.</p>
    </div>
  </div>

  <footer>Made with Castle · <a href="https://castle.xyz">castle.xyz</a></footer>

  <!-- QR generation (client-side, offline-capable after first load) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4O5SAGapGt4FodqL8My0mA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>
    // Targets. Edit these to repoint the QR codes.
    const TARGETS = {
      "qr-lap":  "https://castle.xyz/d/jUmDc-WUYe8W", // Lapping It Up — alpha deck
      "qr-bowl": "https://castle.xyz/d/xly-yGZTPlzB", // Bowling — main deck
    };

    function render(id, url) {
      const el = document.getElementById(id);
      if (!el) return;
      // ~25% of the prior sizing so QR sits next to the art within the
      // card, but clamped big enough to stay scannable at arm's length.
      const size = Math.max(80, Math.min(140, Math.round(window.innerWidth * 0.08)));
      new QRCode(el, {
        text: url,
        width: size,
        height: size,
        correctLevel: QRCode.CorrectLevel.H,
      });
    }

    for (const [id, url] of Object.entries(TARGETS)) render(id, url);
  </script>
</body>
</html>
